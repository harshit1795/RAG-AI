runtime: custom
env: flex

# Instance resources
resources:
  cpu: 1
  memory_gb: 2
  disk_size_gb: 10

# Automatic scaling configuration
automatic_scaling:
  min_num_instances: 1
  max_num_instances: 3
  cool_down_period_sec: 120
  cpu_utilization:
    target_utilization: 0.6

# Network configuration
network:
  forwarded_ports:
    - 8080

# Environment variables (add your Gemini API key here or use Secret Manager)
env_variables:
  PYTHONUNBUFFERED: "1"
  # GEMINI_API_KEY: "your-api-key-here"  # Optional: Set via Secret Manager instead

# Health check configuration
liveness_check:
  path: "/_stcore/health"
  check_interval_sec: 30
  timeout_sec: 4
  failure_threshold: 2
  success_threshold: 2

readiness_check:
  path: "/_stcore/health"
  check_interval_sec: 5
  timeout_sec: 4
  failure_threshold: 2
  success_threshold: 2
  app_start_timeout_sec: 300
