# Cloud Build configuration for RAG Architecture Streamlit App
# This file enables automatic deployments via Cloud Build

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rag-architecture-app:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rag-architecture-app:latest'
      - '.'
    id: 'build-image'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/rag-architecture-app:$COMMIT_SHA'
    id: 'push-image'
    waitFor: ['build-image']

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/rag-architecture-app:latest'
    id: 'push-latest'
    waitFor: ['build-image']

  # Step 4: Deploy to App Engine
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'app'
      - 'deploy'
      - 'app.yaml'
      - '--image-url=gcr.io/$PROJECT_ID/rag-architecture-app:$COMMIT_SHA'
      - '--quiet'
    id: 'deploy-app'
    waitFor: ['push-image']

# Images to store in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/rag-architecture-app:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/rag-architecture-app:latest'

# Build timeout
timeout: '1200s'

# Build options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  
# Substitutions (can be overridden)
substitutions:
  _REGION: 'us-central1'
